name: Deploy Next.js Project (Optimized)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # 3. Install deps (CI only)
      - name: Install dependencies
        run: npm ci

      # 4. Build Next.js
      - name: Build Next.js
        run: npm run build

      # 5. Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. Deploy to server
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_SERVER }} << 'EOF'

          set -e

          cd ${{ secrets.REMOTE_PRODUCTION_PATH }}

          echo "Updating code..."
          git fetch origin
          git reset --hard origin/main

          echo "Starting PM2..."

          if command -v pm2 &> /dev/null
          then
            # فقط restart بدون install ولا build
            if pm2 describe next-app > /dev/null 2>&1; then
              pm2 restart next-app --update-env
            else
              pm2 start npm --name "next-app" -- start
            fi

            pm2 save || true

            echo "App restarted successfully"
          else
            nohup npm start > app.log 2>&1 &
          fi

          EOF
