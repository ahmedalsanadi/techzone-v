name: Deploy Next.js Project (Optimized)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # 3. Install deps (CI only)
      - name: Install dependencies
        run: npm ci

      # 4. Validate translation parity (en vs other locales)
      - name: Check i18n messages
        run: npm run i18n:check

      # 5. Build Next.js
      - name: Build Next.js
        run: npm run build:clean

      # 6. Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 7. Deploy to server
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_SERVER }} << 'EOF'

          set -e

          cd ${{ secrets.REMOTE_PRODUCTION_PATH }}

          echo "Updating code..."
          git fetch origin
          git reset --hard origin/main

          echo "Restarting PM2 on port 8080..."
          
          if command -v pm2 &> /dev/null
          then
            if pm2 describe next-app > /dev/null 2>&1; then
              pm2 restart next-app --update-env
            else
              PORT=8080 pm2 start npm --name "next-app" -- start
            fi
          
            pm2 save || true
          else
            PORT=8080 nohup npm start > app.log 2>&1 &
          fi
          
          echo "Done"

          EOF
