name: Deploy Next.js Project to Production Server

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for re-running the workflow"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Setup Node.js for the app (matches package.json engines; action images use newer Node)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # 3. Install dependencies (npm only — commit package-lock.json once; avoid pnpm-lock.yaml)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 4. Fast validation (the real build happens on the server)
      - name: Lint
        run: npm run lint

      # 5. Set up SSH
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. Deploy to production server
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=6 \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_SERVER }} << 'EOF'

            set -euo pipefail

            cd ${{ secrets.REMOTE_PRODUCTION_PATH }}

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            # Keep runtime environment files on the server (they are gitignored/untracked).
            git clean -fd -e .env -e .env.* -e "*.log"
            git checkout main
            git pull origin main

            echo "Installing dependencies..."
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "Building Next.js app..."
            export NODE_ENV=production
            npm run build

            echo "Restarting application..."

            if command -v pm2 &> /dev/null
            then
              export PORT="${PORT:-3000}"
              if pm2 describe next-app >/dev/null 2>&1; then
                pm2 restart next-app --update-env
              else
                pm2 start npm --name "next-app" -- start --time --merge-logs --max-restarts 20
              fi

              # Persist current PM2 process list so that if PM2 startup is already configured on the server,
              # it will restore the correct app on reboot.
              pm2 save || true

              # Basic verification (fails the deploy if the process isn't online)
              pm2 status next-app

              # Real verification (fail deploy if HTTP isn't responding)
              curl -fsS "http://127.0.0.1:${PORT}/sitemap.xml" >/dev/null
            else
              echo "PM2 not installed - starting manually"
              nohup npm start > app.log 2>&1 &
            fi

            echo "Deployment completed successfully."

          EOF

      # 7. Done
      - name: Deployment complete
        run: echo "🚀 Next.js application deployed successfully!"
