name: Deploy Next.js Project to Production Server

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for re-running the workflow"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # 3. Install dependencies (npm only — commit package-lock.json once; avoid pnpm-lock.yaml)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 4. Build Next.js app
      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      # 5. Set up SSH
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. Deploy to production server
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_SERVER }} << 'EOF'

            set -e

            cd ${{ secrets.REMOTE_PRODUCTION_PATH }}

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            git checkout main
            git pull origin main

            echo "Installing dependencies..."
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "Building Next.js app..."
            export NODE_ENV=production
            npm run build

            echo "Restarting application..."

            if command -v pm2 &> /dev/null
            then
              if pm2 describe next-app >/dev/null 2>&1; then
                pm2 restart next-app
              else
                pm2 start npm --name "next-app" -- start
              fi
            else
              echo "PM2 not installed - starting manually"
              nohup npm start > app.log 2>&1 &
            fi

            echo "Deployment completed successfully."

          EOF

      # 7. Done
      - name: Deployment complete
        run: echo "🚀 Next.js application deployed successfully!"
